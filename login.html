<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<div class="glass-card">

    <h1>Login</h1>

    <form action="/login" method="POST">

        <div class="input-group">

            <label>Username</label>

            <input
            type="text"
            name="username"
            required>

        </div>

        <div class="input-group">

            <label>Password</label>

            <input
            type="password"
            name="password"
            required>

        </div>

        <button type="submit">

            Login

        </button>

    </form>

    <p>

        Create new account?

        <a href="/signup">

            Signup

        </a>

    </p>

</div>

</body>
</html>
